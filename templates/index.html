<!DOCTYPE html>
<html lang="en">
<head>
    <title>🍳 Recipe AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --bg: #121212;
            --sidebar: #0d0d0d;
            --card: #1e1e1e;
            --text: #ffffff;
            --accent: #4CAF50;
        }

        .light {
            --bg: #f5f5f5;
            --sidebar: #ffffff;
            --card: #eaeaea;
            --text: #111;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            display: flex;
            height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: Arial;
        }

        /* SIDEBAR */
        #sidebar {
            width: 260px;
            background: var(--sidebar);
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        #clearBtn {
            background: red;
            color: white;
            border: none;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
            cursor: pointer;
        }

        #historyList {
            flex: 1;
            overflow-y: auto;
        }

        .history-item {
            padding: 10px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-item:hover {
            background: var(--card);
        }

        .delete-btn {
            background: red;
            color: white;
            border: none;
            padding: 4px 8px;
            cursor: pointer;
        }

        /* MAIN */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        #header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: var(--sidebar);
        }

        #themeBtn {
            background: var(--accent);
            border: none;
            padding: 8px 12px;
            color: white;
            cursor: pointer;
            border-radius: 6px;
        }

        /* CONTENT */
        #content {
            padding: 20px;
            max-width: 900px;
            width: 100%;
            margin: auto;
        }

        #inputBox {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 6px;
            border: none;
            background: var(--card);
            color: var(--text);
        }

        #generateBtn {
            background: var(--accent);
            border: none;
            padding: 12px 20px;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        #output {
            margin-top: 20px;
            background: var(--card);
            padding: 20px;
            border-radius: 10px;
            height: 450px;
            overflow-y: auto;
            white-space: pre-wrap;
            line-height: 1.6;
        }

        /* MOBILE */
        @media(max-width: 768px) {
            body {
                flex-direction: column;
            }

            #sidebar {
                width: 100%;
                height: 200px;
            }
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">
    <h2>📜 History</h2>
    <button id="clearBtn" onclick="clearHistory()">Clear All</button>
    <div id="historyList"></div>
</div>

<!-- MAIN -->
<div id="main">

    <!-- HEADER -->
    <div id="header">
        <h2>🍳 Recipe AI</h2>
        <button id="themeBtn" onclick="toggleTheme()">🌙</button>
    </div>

    <!-- CONTENT -->
    <div id="content">

        <div id="inputBox">
            <input type="text" id="prompt" placeholder="Enter dish name...">
            <button id="generateBtn" onclick="generate()">Generate</button>
        </div>

        <div id="output"></div>

    </div>

</div>

<script>
/* ✅ LOAD SAVED THEME */
document.addEventListener("DOMContentLoaded", () => {
    const saved = localStorage.getItem("theme");
    const btn = document.getElementById("themeBtn");

    if (saved === "light") {
        document.body.classList.add("light");
        btn.innerText = "☀️";
    } else {
        btn.innerText = "🌙";
    }
});

/* 🌙 TOGGLE THEME */
function toggleTheme() {
    const body = document.body;
    const btn = document.getElementById("themeBtn");

    body.classList.toggle("light");

    const isLight = body.classList.contains("light");

    btn.innerText = isLight ? "☀️" : "🌙";

    localStorage.setItem("theme", isLight ? "light" : "dark");
}

/* 🍳 GENERATE */
function generate() {
    const prompt = document.getElementById("prompt").value;
    const output = document.getElementById("output");

    if (!prompt.trim()) {
        output.innerText = "⚠️ Enter something...";
        return;
    }

    output.innerText = "🍳 Generating...\n\n";

    fetch("/generate", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: "prompt=" + encodeURIComponent(prompt)
    }).then(res => {
        const reader = res.body.getReader();
        const decoder = new TextDecoder();

        function read() {
            reader.read().then(({ done, value }) => {
                if (done) {
                    loadHistory();
                    return;
                }
                output.innerText += decoder.decode(value);
                output.scrollTop = output.scrollHeight;
                read();
            });
        }
        read();
    });
}

/* 📜 HISTORY */
function loadHistory() {
    fetch("/history")
    .then(res => res.json())
    .then(data => {
        const list = document.getElementById("historyList");
        list.innerHTML = "";

        data.forEach((item, i) => {
            const div = document.createElement("div");
            div.className = "history-item";

            const text = document.createElement("span");
            text.innerText = item.prompt;
            text.onclick = () => loadItem(i);

            const del = document.createElement("button");
            del.innerText = "X";
            del.className = "delete-btn";
            del.onclick = (e) => {
                e.stopPropagation();
                deleteItem(i);
            };

            div.appendChild(text);
            div.appendChild(del);
            list.appendChild(div);
        });
    });
}

function loadItem(i) {
    fetch("/history/" + i)
    .then(res => res.json())
    .then(data => {
        document.getElementById("output").innerText = data.response;
    });
}

function deleteItem(i) {
    fetch("/delete/" + i, { method: "DELETE" })
    .then(() => loadHistory());
}

function clearHistory() {
    if (!confirm("Delete all history?")) return;

    fetch("/clear", { method: "DELETE" })
    .then(() => {
        loadHistory();
        document.getElementById("output").innerText = "";
    });
}

loadHistory();
</script>

</body>
</html>
